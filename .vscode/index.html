    <script>
        function toggleMode() {
            const html = document.documentElement
            html.classList.toggle("light")

            const img = document.querySelector("#profile img")

            if (html.classList.contains("light")) {
                img.setAttribute("src", "./assets/assets/assets/Avatar.png")
            } else {
                img.setAttribute("src", "./assets/assets/assets/Avatar.png")
            }
        }
    </script>
